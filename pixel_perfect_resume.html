<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pixel-Perfect Resume Template</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --sidebar-bg: #111215;
      --main-bg: #23242a;
      --section-bar: #23242a;
      --section-bar-main: #18191c;
      --divider: #35363b;
      --text-main: #f8f8f8;
      --text-light: #bdbdbd;
      --accent: #00adb5;
      --section-title: #bdbdbd;
      --radius: 10px;
    }
    body {
      background: #18191c;
      font-family: 'Montserrat', Arial, sans-serif;
      margin: 0;
      color: var(--text-main);
    }
    .cv-wrapper {
      display: flex;
      max-width: 820px;
      min-height: 100vh;
      margin: 32px auto;
      box-shadow: 0 4px 32px rgba(0,0,0,0.5);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .cv-sidebar {
      width: 270px;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 32px 0;
      position: relative;
    }
    .profile-img-wrap {
      width: 120px;
      height: 120px;
      margin-top: 32px;
      margin-bottom: 18px;
      background: #23242a;
      border-radius: 18px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 4px solid #23242a;
      box-shadow: 0 2px 8px #0008;
    }
    .profile-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .upload-label {
      display: block;
      margin: 0 auto 10px auto;
      color: var(--text-light);
      font-size: 0.95em;
      text-align: center;
      cursor: pointer;
    }
    .sidebar-section {
      width: 100%;
      margin-bottom: 18px;
    }
    .section-bar {
      background: var(--section-bar);
      color: var(--section-title);
      font-size: 0.93em;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 7px 0 7px 24px;
      border-radius: 0 18px 18px 0;
      margin-bottom: 0;
    }
    .sidebar-content {
      padding: 12px 24px 0 24px;
      color: var(--text-light);
      font-size: 0.98em;
    }
    .sidebar-content ul {
      margin: 0 0 0 18px;
      padding: 0;
      color: var(--text-main);
    }
    .sidebar-content li {
      margin-bottom: 5px;
      font-size: 0.98em;
    }
    .contact-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .contact-list li {
      display: flex;
      align-items: center;
      margin-bottom: 7px;
      color: var(--text-light);
      font-size: 0.98em;
    }
    .contact-list i {
      color: var(--accent);
      margin-right: 10px;
      width: 18px;
      text-align: center;
      font-size: 1.1em;
    }
    .cv-main {
      flex: 1;
      background: var(--main-bg);
      padding: 0 36px 0 36px;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }
    .main-header {
      margin-top: 38px;
      margin-bottom: 8px;
    }
    .cv-name {
      font-size: 2.1em;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1px;
      margin-bottom: 2px;
      line-height: 1.1;
    }
    .cv-title {
      font-size: 1.1em;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }
    .divider {
      border: none;
      border-top: 1.5px solid var(--divider);
      margin: 12px 0 18px 0;
    }
    .main-section {
      margin-bottom: 18px;
    }
    .section-bar-main {
      background: var(--section-bar-main);
      color: var(--section-title);
      font-size: 0.93em;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 7px 0 7px 18px;
      border-radius: 18px 0 0 18px;
      margin-bottom: 0;
    }
    .main-content {
      padding: 12px 0 0 18px;
      color: var(--text-light);
      font-size: 0.98em;
    }
    .edu-entry, .ref-entry {
      margin-bottom: 7px;
    }
    .edu-entry strong, .ref-entry strong {
      color: #fff;
    }
    .interest-list, .lang-list {
      display: flex;
      flex-wrap: wrap;
      gap: 16px 18px;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .interest-entry {
      display: flex;
      align-items: center;
      font-size: 1em;
      color: var(--text-light);
    }
    .interest-entry i {
      color: var(--accent);
      margin-right: 7px;
      font-size: 1.1em;
    }
    .lang-entry {
      font-size: 1em;
      color: var(--text-main);
    }
    /* Form styles */
    .cv-form-wrap {
      max-width: 820px;
      margin: 32px auto 0 auto;
      background: #18191c;
      border-radius: var(--radius);
      box-shadow: 0 2px 16px rgba(0,0,0,0.18);
      padding: 24px 32px 10px 32px;
    }
    .cv-form-wrap h2 {
      color: var(--accent);
      margin-bottom: 18px;
      font-size: 1.2em;
      letter-spacing: 1px;
    }
    .form-row {
      display: flex;
      gap: 18px;
      margin-bottom: 13px;
    }
    .form-row label {
      min-width: 110px;
      font-size: 0.98em;
      color: var(--text-light);
      font-weight: 500;
      margin-top: 7px;
    }
    .form-row input, .form-row textarea {
      flex: 1;
      padding: 7px 10px;
      border-radius: 6px;
      border: 1px solid var(--divider);
      background: #23242a;
      color: #fff;
      font-size: 1em;
      outline: none;
      transition: border 0.2s;
    }
    .form-row input[type='file'] {
      padding: 0;
      color: #fff;
      background: none;
      border: none;
    }
    .form-row textarea {
      min-height: 36px;
      resize: vertical;
    }
    .form-row input:focus, .form-row textarea:focus {
      border: 1.5px solid var(--accent);
    }
    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 16px;
      margin-top: 10px;
      margin-bottom: 0;
    }
    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 9px 22px;
      border-radius: 6px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      box-shadow: 0 2px 8px rgba(0,173,181,0.08);
    }
    .btn:hover {
      background: #02858a;
    }
    @media (max-width: 900px) {
      .cv-wrapper, .cv-form-wrap { flex-direction: column; max-width: 99vw; padding: 0; }
      .cv-sidebar, .cv-main { width: 100%; padding: 0 4vw; }
      .cv-main { padding: 0 2vw; }
    }
    @media (max-width: 600px) {
      .cv-wrapper, .cv-form-wrap { padding: 0; }
      .cv-sidebar, .cv-main { padding: 0 2vw; }
      .cv-main { padding: 0 1vw; }
    }
  </style>
</head>
<body>
  <div class="cv-form-wrap">
    <h2>Edit Resume Details</h2>
    <form id="cv-form">
      <div class="form-row">
        <label for="profileImg">Profile Image</label>
        <input type="file" id="profileImg" accept="image/*">
      </div>
      <div class="form-row">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" required>
      </div>
      <div class="form-row">
        <label for="jobTitle">Job Title</label>
        <input type="text" id="jobTitle" required>
      </div>
      <div class="form-row">
        <label for="aboutMe">About Me</label>
        <textarea id="aboutMe" rows="2"></textarea>
      </div>
      <div class="form-row">
        <label for="skills">Skills<br><span style="font-size:0.9em;color:#666;">(comma separated)</span></label>
        <input type="text" id="skills" placeholder="e.g. Creativity, Communication, Typography">
      </div>
      <div class="form-row">
        <label for="phone">Phone</label>
        <input type="text" id="phone">
      </div>
      <div class="form-row">
        <label for="email">Email</label>
        <input type="email" id="email">
      </div>
      <div class="form-row">
        <label for="website">Website</label>
        <input type="text" id="website" placeholder="e.g. yoursite.com">
      </div>
      <div class="form-row">
        <label for="education">Education<br><span style="font-size:0.9em;color:#666;">(one per line: degree, school, years)</span></label>
        <textarea id="education" rows="2"></textarea>
      </div>
      <div class="form-row">
        <label for="references">References<br><span style="font-size:0.9em;color:#666;">(one per line: name, details)</span></label>
        <textarea id="references" rows="2"></textarea>
      </div>
      <div class="form-row">
        <label for="interests">Interests<br><span style="font-size:0.9em;color:#666;">(comma separated, e.g. Music, Coding, Travel)</span></label>
        <input type="text" id="interests">
      </div>
      <div class="form-row">
        <label for="languages">Languages<br><span style="font-size:0.9em;color:#666;">(comma separated)</span></label>
        <input type="text" id="languages" placeholder="e.g. English, French, German">
      </div>
      <div class="form-actions">
        <button type="button" class="btn" id="previewBtn">Preview CV</button>
        <button type="button" class="btn" id="downloadBtn">Download as PDF</button>
      </div>
    </form>
  </div>

  <div class="cv-wrapper" id="cv-preview" style="margin-top:32px;">
    <!-- Sidebar -->
    <div class="cv-sidebar">
      <div class="profile-img-wrap">
        <img src="" alt="Profile" class="profile-img" id="cvProfileImg" style="display:none;">
      </div>
      <label for="profileImg" class="upload-label" style="margin-bottom:10px;">Upload Image</label>
      <div class="sidebar-section">
        <div class="section-bar">About Me</div>
        <div class="sidebar-content" id="cvAboutMe"></div>
      </div>
      <div class="sidebar-section">
        <div class="section-bar">Skills</div>
        <div class="sidebar-content">
          <ul id="cvSkills"></ul>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="section-bar">Contact</div>
        <div class="sidebar-content">
          <ul class="contact-list">
            <li><i class="fas fa-phone"></i><span id="cvPhone"></span></li>
            <li><i class="fas fa-envelope"></i><span id="cvEmail"></span></li>
            <li><i class="fas fa-globe"></i><span id="cvWebsite"></span></li>
          </ul>
        </div>
      </div>
    </div>
    <!-- Main Area -->
    <div class="cv-main">
      <div class="main-header">
        <div class="cv-name" id="cvFullName"></div>
        <div class="cv-title" id="cvJobTitle"></div>
      </div>
      <hr class="divider">
      <div class="main-section">
        <div class="section-bar-main">Education</div>
        <div class="main-content" id="cvEducation"></div>
      </div>
      <div class="main-section">
        <div class="section-bar-main">References</div>
        <div class="main-content" id="cvReferences"></div>
      </div>
      <div class="main-section">
        <div class="section-bar-main">Interests</div>
        <ul class="interest-list main-content" id="cvInterests"></ul>
      </div>
      <div class="main-section">
        <div class="section-bar-main">Languages</div>
        <ul class="lang-list main-content" id="cvLanguages"></ul>
      </div>
    </div>
  </div>

  <!-- html2pdf.js for PDF export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script>
    // Font Awesome icon mapping for interests
    const interestIcons = {
      'music': 'fa-music',
      'coding': 'fa-laptop-code',
      'travel': 'fa-plane',
      'reading': 'fa-book',
      'sports': 'fa-dumbbell',
      'photography': 'fa-camera',
      'art': 'fa-paint-brush',
      'gaming': 'fa-gamepad',
      'writing': 'fa-pen-nib',
      'cooking': 'fa-utensils',
      'movies': 'fa-film',
      'fitness': 'fa-dumbbell',
      'media': 'fa-photo-film',
      'technology': 'fa-laptop',
      'design': 'fa-pencil-ruler'
    };

    // Update CV preview
    function updatePreview() {
      // Profile image
      const imgInput = document.getElementById('profileImg');
      const cvImg = document.getElementById('cvProfileImg');
      if (imgInput.files && imgInput.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          cvImg.src = e.target.result;
          cvImg.style.display = 'block';
        };
        reader.readAsDataURL(imgInput.files[0]);
      } else {
        cvImg.src = '';
        cvImg.style.display = 'none';
      }

      // Text fields
      document.getElementById('cvFullName').textContent = document.getElementById('fullName').value;
      document.getElementById('cvJobTitle').textContent = document.getElementById('jobTitle').value;
      document.getElementById('cvAboutMe').textContent = document.getElementById('aboutMe').value;

      // Skills
      const skills = document.getElementById('skills').value.split(',').map(s => s.trim()).filter(Boolean);
      const skillsList = document.getElementById('cvSkills');
      skillsList.innerHTML = '';
      skills.forEach(skill => {
        const li = document.createElement('li');
        li.textContent = skill;
        skillsList.appendChild(li);
      });

      // Contact
      document.getElementById('cvPhone').textContent = document.getElementById('phone').value;
      document.getElementById('cvEmail').textContent = document.getElementById('email').value;
      document.getElementById('cvWebsite').textContent = document.getElementById('website').value;

      // Education
      const eduLines = document.getElementById('education').value.split('\n').map(e => e.trim()).filter(Boolean);
      const eduDiv = document.getElementById('cvEducation');
      eduDiv.innerHTML = '';
      eduLines.forEach(line => {
        const div = document.createElement('div');
        div.className = 'edu-entry';
        div.innerHTML = `<strong>${line.split(',')[0] || ''}</strong> <span style="color:#bdbdbd;">${line.split(',').slice(1).join(',')}</span>`;
        eduDiv.appendChild(div);
      });

      // References
      const refLines = document.getElementById('references').value.split('\n').map(r => r.trim()).filter(Boolean);
      const refDiv = document.getElementById('cvReferences');
      refDiv.innerHTML = '';
      refLines.forEach(line => {
        const div = document.createElement('div');
        div.className = 'ref-entry';
        div.innerHTML = `<strong>${line.split(',')[0] || ''}</strong> <span style="color:#bdbdbd;">${line.split(',').slice(1).join(',')}</span>`;
        refDiv.appendChild(div);
      });

      // Interests
      const interests = document.getElementById('interests').value.split(',').map(i => i.trim()).filter(Boolean);
      const interestList = document.getElementById('cvInterests');
      interestList.innerHTML = '';
      interests.forEach(interest => {
        const li = document.createElement('li');
        li.className = 'interest-entry';
        const iconKey = interest.toLowerCase();
        const iconClass = interestIcons[iconKey] || 'fa-star';
        li.innerHTML = `<i class="fas ${iconClass}"></i>${interest}`;
        interestList.appendChild(li);
      });

      // Languages
      const langs = document.getElementById('languages').value.split(',').map(l => l.trim()).filter(Boolean);
      const langList = document.getElementById('cvLanguages');
      langList.innerHTML = '';
      langs.forEach(lang => {
        const li = document.createElement('li');
        li.className = 'lang-entry';
        li.textContent = lang;
        langList.appendChild(li);
      });
    }

    // Event listeners for live preview
    document.querySelectorAll('#cv-form input, #cv-form textarea').forEach(el => {
      el.addEventListener('input', updatePreview);
      el.addEventListener('change', updatePreview);
    });

    // Preview button
    document.getElementById('previewBtn').addEventListener('click', function(e) {
      e.preventDefault();
      updatePreview();
      document.getElementById('cv-preview').scrollIntoView({behavior: 'smooth'});
    });

    // Download as PDF
    document.getElementById('downloadBtn').addEventListener('click', function(e) {
      e.preventDefault();
      updatePreview();
      // Hide form before export
      document.querySelector('.cv-form-wrap').style.display = 'none';
      setTimeout(() => {
        const element = document.getElementById('cv-preview');
        const opt = {
          margin:       0,
          filename:     'resume.pdf',
          image:        { type: 'jpeg', quality: 0.98 },
          html2canvas:  { scale: 2, useCORS: true },
          jsPDF:        { unit: 'pt', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save().then(() => {
          document.querySelector('.cv-form-wrap').style.display = '';
        });
      }, 400);
    });

    // Initial preview
    updatePreview();
  </script>
</body>
</html>
